name: "Check Backend Code Style"
permissions:
  contents: read

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - name: "Install dependencies"
        run: |
          uv sync
      - name: "Lint backend code"
        run: |
          uv run ruff check
          uv run ruff format --check
