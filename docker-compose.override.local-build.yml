services:
  app:
    build:
      context: .
      dockerfile: docker/app.docker
      args:
        UV_ARGS: "--group dev"

  worker:
    build:
      context: .
      dockerfile: docker/app.docker
      args:
        UV_ARGS: "--group dev"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.docker
    ports:
      # Map to expose the docker webserver to outside
      - 8080:80